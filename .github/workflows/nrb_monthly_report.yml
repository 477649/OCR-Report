name: NRB Monthly BFI Report

on:
  workflow_dispatch:
  schedule:
    # GitHub cron runs in UTC.
    # 03:30 UTC = 09:15 Nepal Time.
    - cron: "30 3 * * 1-5"

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run NRB monthly pipeline
        run: |
          python scripts/nrb_monthly_pipeline.py \
            --repo-root . \
            --months 24 \
            --target-bank Kamana

      - name: Commit updated data and reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/raw data/processed data/state reports

          if git diff --cached --quiet; then
            echo "No new NRB data or report changes found."
          else
            git commit -m "Update NRB monthly BFI report"
            git push
          fi
